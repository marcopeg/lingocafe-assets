user nginx;
worker_processes auto;

error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    map $http_accept $negotiated_image_1 {
        default "$uri.jpg";
        "~*image/avif(?!\\s*;\\s*q=0(?:\\.0*)?(?:[,;]|$))" "$uri.avif";
        "~*image/webp(?!\\s*;\\s*q=0(?:\\.0*)?(?:[,;]|$))" "$uri.webp";
    }

    map $http_accept $negotiated_image_2 {
        default "/__lingocafe_missing_image_variant__";
        "~*image/avif(?!\\s*;\\s*q=0(?:\\.0*)?(?:[,;]|$))" "$uri.webp";
        "~*image/webp(?!\\s*;\\s*q=0(?:\\.0*)?(?:[,;]|$))" "$uri.jpg";
    }

    map $http_accept $negotiated_image_3 {
        default "/__lingocafe_missing_image_variant__";
        "~*image/avif(?!\\s*;\\s*q=0(?:\\.0*)?(?:[,;]|$))" "$uri.jpg";
    }

    server_tokens off;

    access_log off;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;

    aio threads;

    open_file_cache max=10000 inactive=60s;
    open_file_cache_valid 120s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;

    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_proxied any;
    gzip_types
        application/javascript
        application/json
        application/manifest+json
        application/rss+xml
        application/vnd.ms-fontobject
        application/wasm
        application/x-font-ttf
        application/xml
        font/opentype
        image/svg+xml
        text/css
        text/javascript
        text/plain
        text/xml;

    server {
        listen 80;
        listen [::]:80;
        server_name _;

        root /usr/share/nginx/html;
        index off;

        location = /healthz {
            access_log off;
            default_type text/plain;
            return 200 "ok\n";
        }

        location ~ /\. {
            return 404;
        }

        location ~ ^/(?:.*/)?[^/.]+$ {
            try_files $negotiated_image_1 $negotiated_image_2 $negotiated_image_3 @not_found;

            etag off;
            if_modified_since off;
            add_header Vary Accept always;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
            add_header Access-Control-Allow-Origin "*" always;
            add_header X-Content-Type-Options "nosniff" always;
        }

        location / {
            try_files $uri @not_found;

            etag off;
            if_modified_since off;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
            add_header Access-Control-Allow-Origin "*" always;
            add_header X-Content-Type-Options "nosniff" always;
        }

        location @not_found {
            add_header Cache-Control "no-store" always;
            return 404;
        }
    }
}
